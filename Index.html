<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microservices Patterns — microservices.io</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090e;--bg2:#0c0f19;--bg3:#111520;--bg4:#161c2c;
  --border:#1a2035;--border2:#242d48;
  --text:#c4d4ee;--muted:#4e6080;--faint:#2a3550;
  --blue:#4a90d9;--cyan:#22d3ee;--green:#34d399;
  --amber:#fbbf24;--red:#f87171;--purple:#a78bfa;--pink:#f472b6;
  --teal:#2dd4bf;--orange:#fb923c;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── LAYOUT ─────────────────────────────────────── */
.app{display:grid;grid-template-columns:300px 1fr;grid-template-rows:54px 1fr;height:100vh;grid-template-areas:"hdr hdr" "nav main"}
@media(max-width:768px){.app{grid-template-columns:1fr;grid-template-rows:54px auto 1fr;grid-template-areas:"hdr" "nav" "main";height:auto}}

/* ── HEADER ─────────────────────────────────────── */
.hdr{grid-area:hdr;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;z-index:20}
.hdr-brand{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--blue);font-weight:500;text-transform:uppercase;white-space:nowrap}
.hdr-title{font-size:14px;font-weight:600;color:#dde8ff;flex:1}
.hdr-source{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap}
.hdr-source a{color:var(--blue);text-decoration:none}
.hdr-source a:hover{text-decoration:underline}
.prog-wrap{display:flex;align-items:center;gap:8px}
.prog-track{width:120px;height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:2px;transition:width .4s}
.prog-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;min-width:40px;text-align:right}

/* ── SIDEBAR ─────────────────────────────────────── */
.nav{grid-area:nav;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.nav::-webkit-scrollbar{width:3px}.nav::-webkit-scrollbar-thumb{background:var(--border2)}
.nav-group{padding:12px 10px 4px}
.nav-group-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;padding:0 8px;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.nav-group-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:7px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.nav-item:hover{background:var(--bg3)}
.nav-item.active{background:rgba(74,144,217,.1);border-color:rgba(74,144,217,.25)}
.nav-item.done .nd{background:var(--green)!important}
.nav-item.active .nd{box-shadow:0 0 6px currentColor}
.nd{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:all .2s}
.nav-lbl{font-size:12px;font-weight:500;color:var(--muted);flex:1;line-height:1.3;transition:color .15s}
.nav-item.active .nav-lbl{color:#a0c0f0}
.nav-item.done .nav-lbl{color:#3a8060}
.nav-item:hover .nav-lbl{color:var(--text)}
.nav-num{font-family:'DM Mono',monospace;font-size:9px;color:var(--faint);padding:2px 5px;background:var(--bg3);border-radius:3px}
.nav-item.active .nav-num{background:rgba(74,144,217,.15);color:var(--blue)}
.nav-div{height:1px;background:var(--border);margin:6px 10px}

/* ── MAIN ─────────────────────────────────────── */
.main{grid-area:main;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.main::-webkit-scrollbar{width:4px}.main::-webkit-scrollbar-thumb{background:var(--border2)}

.pview{display:none;padding:36px 44px;max-width:900px;animation:fadeUp .28s ease}
.pview.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){.pview{padding:22px 18px}}

/* ── PATTERN VIEW COMPONENTS ─────────────────────── */
.ptag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--blue);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ptag::before{content:'';width:18px;height:1px;background:var(--blue)}
.ptitle{font-size:30px;font-weight:700;color:#eaf2ff;line-height:1.1;margin-bottom:10px;letter-spacing:-.4px}
.psub{font-size:14px;color:var(--muted);line-height:1.65;margin-bottom:24px;max-width:640px}
.source-link{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);border:1px solid rgba(74,144,217,.3);border-radius:5px;padding:4px 10px;text-decoration:none;margin-bottom:20px;transition:all .15s}
.source-link:hover{background:rgba(74,144,217,.08);border-color:var(--blue)}

.divider{height:1px;background:var(--border);margin:24px 0}

.sh{font-size:17px;font-weight:700;color:#dde8ff;margin:22px 0 12px;display:flex;align-items:center;gap:10px}
.sh::after{content:'';flex:1;height:1px;background:var(--border)}
.ssh{font-family:'DM Mono',monospace;font-size:12px;color:#7090b0;margin:18px 0 8px;letter-spacing:.3px}

/* Pattern image */
.pimg-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin:14px 0;text-align:center}
.pimg-wrap img{max-width:100%;height:auto;border-radius:6px;display:block;margin:0 auto}
.pimg-caption{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:8px;letter-spacing:.5px}

/* Cards */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin:12px 0}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .2s}
.card:hover{border-color:var(--border2);transform:translateY(-1px)}
.card:hover::before{opacity:1}
.card.blue::before{background:linear-gradient(90deg,var(--blue),var(--cyan))}
.card.green::before{background:linear-gradient(90deg,var(--green),var(--teal))}
.card.amber::before{background:linear-gradient(90deg,var(--amber),var(--orange))}
.card.purple::before{background:linear-gradient(90deg,var(--purple),var(--pink))}
.card.red::before{background:linear-gradient(90deg,var(--red),var(--orange))}
.card.cyan::before{background:linear-gradient(90deg,var(--cyan),var(--blue))}
.card.teal::before{background:linear-gradient(90deg,var(--teal),var(--green))}
.card-cat{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.card-cat.blue{color:var(--blue)}.card-cat.green{color:var(--green)}.card-cat.amber{color:var(--amber)}
.card-cat.purple{color:var(--purple)}.card-cat.red{color:var(--red)}.card-cat.cyan{color:var(--cyan)}.card-cat.teal{color:var(--teal)}
.card-title{font-size:14px;font-weight:600;color:#d0e0f8;margin-bottom:7px}
.card-body{font-size:12.5px;color:var(--muted);line-height:1.6;font-family:'DM Mono',monospace;font-weight:300}

/* Bullets */
.bullets{display:flex;flex-direction:column;gap:7px;margin:12px 0}
.bul{display:flex;align-items:flex-start;gap:9px;font-size:13.5px;color:var(--text);line-height:1.55}
.bi{width:17px;height:17px;border-radius:50%;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:'DM Mono',monospace}
.bi.blue{background:rgba(74,144,217,.15);color:var(--blue)}
.bi.green{background:rgba(52,211,153,.15);color:var(--green)}
.bi.amber{background:rgba(251,191,36,.15);color:var(--amber)}
.bi.red{background:rgba(248,113,113,.15);color:var(--red)}
.bi.purple{background:rgba(167,139,250,.15);color:var(--purple)}
.bi.cyan{background:rgba(34,211,238,.15);color:var(--cyan)}

/* Callout */
.callout{border-radius:8px;padding:13px 16px;margin:14px 0;display:flex;gap:11px;align-items:flex-start}
.callout.info{background:rgba(74,144,217,.07);border:1px solid rgba(74,144,217,.2)}
.callout.warn{background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.2)}
.callout.danger{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2)}
.callout.success{background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.2)}
.callout-ico{font-size:15px;flex-shrink:0;margin-top:1px}
.callout-txt{font-size:13px;line-height:1.6}
.callout.info .callout-txt{color:#80aadc}
.callout.warn .callout-txt{color:#c8a030}
.callout.danger .callout-txt{color:#d07070}
.callout.success .callout-txt{color:#40b880}

/* Table */
.tbl{width:100%;border-collapse:collapse;margin:12px 0;font-size:12.5px}
.tbl th{background:var(--bg3);color:var(--blue);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:9px 13px;text-align:left;border-bottom:1px solid var(--border)}
.tbl td{padding:9px 13px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top;line-height:1.5}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.02)}

/* Tags */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;margin:2px}
.tag.blue{background:rgba(74,144,217,.12);color:var(--blue);border:1px solid rgba(74,144,217,.25)}
.tag.green{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.25)}
.tag.amber{background:rgba(251,191,36,.12);color:var(--amber);border:1px solid rgba(251,191,36,.25)}
.tag.red{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.25)}
.tag.purple{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.25)}
.tag.cyan{background:rgba(34,211,238,.12);color:var(--cyan);border:1px solid rgba(34,211,238,.25)}

/* Code */
.code{background:#050810;border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:8px;padding:14px 16px;margin:12px 0;font-family:'DM Mono',monospace;font-size:11.5px;color:#80aad8;line-height:1.75;overflow-x:auto;white-space:pre}
.code .cm{color:var(--muted);font-style:italic}
.code .kw{color:var(--purple)}
.code .str{color:#86efac}
.code .num{color:var(--amber)}
.code .cls{color:var(--cyan)}

/* Diagram box */
.dbox{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin:14px 0;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px;overflow-x:auto}
.db{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:9px 14px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;text-align:center;white-space:nowrap}
.db.blue{border-color:rgba(74,144,217,.4);color:#80c0f0;background:rgba(74,144,217,.08)}
.db.green{border-color:rgba(52,211,153,.4);color:#60d898;background:rgba(52,211,153,.08)}
.db.amber{border-color:rgba(251,191,36,.4);color:#c8a030;background:rgba(251,191,36,.08)}
.db.purple{border-color:rgba(167,139,250,.4);color:#b09af8;background:rgba(167,139,250,.08)}
.db.red{border-color:rgba(248,113,113,.35);color:#d88080;background:rgba(248,113,113,.08)}
.db.cyan{border-color:rgba(34,211,238,.4);color:#50c8e0;background:rgba(34,211,238,.08)}
.db.teal{border-color:rgba(45,212,191,.4);color:#40c8b0;background:rgba(45,212,191,.08)}
.darr{color:var(--muted);font-size:16px;padding:0 6px;line-height:1}
.dcol{display:flex;flex-direction:column;gap:6px}

/* Patterns index on overview */
.pattern-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin:12px 0}
.pcard{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:14px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px}
.pcard:hover{border-color:var(--border2);transform:translateY(-1px)}
.pcard-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.pcard-info .pcard-name{font-size:13px;font-weight:600;color:#c0d4f0;margin-bottom:3px}
.pcard-info .pcard-desc{font-size:11px;color:var(--muted);line-height:1.5;font-family:'DM Mono',monospace;font-weight:300}

/* Nav footer */
.nfooter{display:flex;align-items:center;gap:10px;margin-top:36px;padding-top:22px;border-top:1px solid var(--border)}
.nbtn{display:flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid var(--border2);background:var(--bg2);color:var(--text)}
.nbtn:hover{border-color:var(--blue);color:var(--blue)}
.nbtn:disabled{opacity:.3;cursor:default}
.nbtn:disabled:hover{border-color:var(--border2);color:var(--text)}
.nbtn.primary{background:rgba(74,144,217,.1);border-color:rgba(74,144,217,.35);color:#80b8f0}
.nbtn.primary:hover{background:rgba(74,144,217,.18);border-color:var(--blue);color:#b0d4ff}
.ncenter{flex:1;text-align:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-brand">MS · Patterns</div>
  <div class="hdr-title">Microservices Pattern Language</div>
  <div class="hdr-source">Source: <a href="https://microservices.io/patterns/" target="_blank">microservices.io</a></div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
    <div class="prog-lbl" id="plbl">0/44</div>
  </div>
</header>

<!-- SIDEBAR -->
<nav class="nav" id="sidebar"></nav>

<!-- MAIN -->
<main class="main" id="main"></main>
</div>
